<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sales Dashboard 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f4f8;color:#1e293b;min-width:960px}

/* ── HEADER ── */
.topbar{background:#1e3a8a;border-bottom:1px solid #1e3a8a;padding:12px 28px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:999}
.topbar-logo{display:flex;align-items:center;gap:10px}
.topbar-logo .icon{width:36px;height:36px;border-radius:8px;background:#2563eb;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;flex-shrink:0}
.topbar-logo h1{font-size:18px;font-weight:700;color:#fff;letter-spacing:.3px}
.topbar-logo .sub{font-size:11px;color:#93c5fd;margin-top:1px}
.topbar-tabs{display:flex;gap:6px;margin-left:auto;align-items:center}
.topbar-tab{padding:6px 16px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid rgba(255,255,255,.3);color:rgba(255,255,255,.75);background:transparent;transition:background .15s}
.topbar-tab.act{background:#fff;color:#1e3a8a;border-color:#fff}
.topbar-tab:hover:not(.act){background:rgba(255,255,255,.15)}
.topbar-date{font-size:11px;color:#93c5fd;margin-left:8px;white-space:nowrap}

/* ── FILTER BAR ── */
.filter-bar{background:#fff;border-bottom:1px solid #e2e8f0;padding:12px 28px;display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end}
.filter-group{display:flex;flex-direction:column;gap:4px}
.filter-group label{font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.4px}
.filter-note{font-size:10px;color:#94a3b8;margin-top:2px}
.btn-reset{padding:8px 16px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:6px;cursor:pointer;font-size:12px;color:#2563eb;font-weight:600;align-self:flex-end}
.btn-reset:hover{background:#dbeafe}

/* ── MULTISELECT ── */
.ms-wrap{position:relative;min-width:150px}
.ms-btn{width:100%;padding:7px 10px;border:1px solid #bfdbfe;border-radius:6px;background:#f0f7ff;cursor:pointer;font-size:12px;text-align:left;color:#1e40af;display:flex;justify-content:space-between;align-items:center;font-weight:500}
.ms-btn::after{content:"▾";font-size:10px;color:#60a5fa}
.ms-btn:hover{border-color:#93c5fd;background:#e0f0ff}
.ms-drop{display:none;position:absolute;z-index:999;top:calc(100% + 4px);left:0;min-width:100%;background:#fff;border:1px solid #bfdbfe;border-radius:8px;box-shadow:0 8px 24px rgba(37,99,235,.12);max-height:260px;overflow-y:auto}
.ms-drop.open{display:block}
.ms-search{padding:8px;border-bottom:1px solid #f1f5f9}
.ms-search input{width:100%;border:1px solid #dbeafe;border-radius:4px;padding:4px 8px;font-size:12px;outline:none}
.ms-item{display:flex;align-items:center;gap:8px;padding:6px 12px;cursor:pointer;font-size:12px;color:#374151}
.ms-item:hover{background:#f0f7ff}
.ms-item input{cursor:pointer;accent-color:#2563eb}
.ms-actions{display:flex;gap:0;border-top:1px solid #f1f5f9}
.ms-actions button{flex:1;padding:6px;font-size:11px;border:none;background:none;cursor:pointer;color:#2563eb;font-weight:500}
.ms-actions button:hover{background:#eff6ff}

/* ── LAYOUT ── */
.content{padding:20px 28px;display:flex;flex-direction:column;gap:20px}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}

/* ── KPI CARDS ── */
.kpi{background:#fff;border-radius:12px;padding:16px 20px;border:1px solid #e2e8f0}
.kpi-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:10px}
.kpi label{font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.4px}
.kpi .val{font-size:22px;font-weight:700;color:#1e3a8a;margin-top:6px;line-height:1.2}
.kpi .sub{font-size:11px;color:#94a3b8;margin-top:4px}
.kpi.blue{border:1px solid #bfdbfe;border-top:5px solid #2563eb;background:#eff6ff}
.kpi.blue .kpi-icon{background:#dbeafe;color:#2563eb}
.kpi.green{border:1px solid #a7f3d0;border-top:5px solid #059669;background:#ecfdf5}
.kpi.green .kpi-icon{background:#d1fae5;color:#059669}
.kpi.green .val{color:#065f46}
.kpi.amber{border:1px solid #fde68a;border-top:5px solid #f59e0b;background:#fffbeb}
.kpi.amber .kpi-icon{background:#fef3c7;color:#d97706}
.kpi.amber .val{color:#78350f}
.kpi.red{border:1px solid #fecdd3;border-top:5px solid #ef4444;background:#fff1f2}
.kpi.red .kpi-icon{background:#ffe4e6;color:#dc2626}
.kpi.red .val{color:#7f1d1d}

/* ── CHART SECTIONS ── */
.section{background:#fff;border-radius:12px;padding:18px 20px;border:1px solid #e2e8f0;overflow:hidden}
.sec-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px;padding-bottom:12px;border-bottom:2px solid #eff6ff}
.sec-hdr h2{font-size:15px;font-weight:700;color:#1e3a8a}
.sec-hdr h2::before{content:'';display:inline-block;width:4px;height:16px;background:#2563eb;border-radius:2px;margin-right:8px;vertical-align:-2px}
.chart-scroll{overflow-x:auto;overflow-y:hidden}
.chart-box{position:relative;height:340px}
</style>
</head>

<div class="topbar">
  <div class="topbar-logo">
    <div class="icon">📊</div>

  <div class="topbar-tabs">
    <button class="topbar-tab act" onclick="scrollTo(0,0)">ภาพรวม</button>
    <button class="topbar-tab" onclick="document.getElementById('sec-supplier').scrollIntoView({behavior:'smooth'})">Supplier</button>
    <button class="topbar-tab" onclick="document.getElementById('sec-chart1').scrollIntoView({behavior:'smooth'})">Brands</button>
    <button class="topbar-tab" onclick="document.getElementById('sec-chart4').scrollIntoView({behavior:'smooth'})">Monthly Trend</button>
  </div>
  <div class="topbar-date" id="update-time"></div>
</div>

<div class="filter-bar">
  <div class="filter-group">
    <label>เดือน</label>
    <div class="ms-wrap" id="ms-month"></div>
  </div>
  <div class="filter-group">
    <label>Sub Dept.</label>
    <div class="ms-wrap" id="ms-dept"></div>
    <div class="filter-note">⚡ เชื่อมเฉพาะกราฟที่ 1</div>
  </div>
  <div class="filter-group">
    <label>Brand (กราฟ 1)</label>
    <div class="ms-wrap" id="ms-brand1"></div>
  </div>
  <button class="btn-reset" onclick="resetAll()">↺ รีเซ็ต</button>
</div>

<div class="content">

  <!-- KPI Row -->
  <div class="kpi-row" style="grid-template-columns:repeat(2,1fr)">
    <div class="kpi blue">
      <div class="kpi-icon">📈</div>
      <label>ยอดที่เสนอทั้งหมด</label>
      <div class="val" id="kpi-total">—</div>
      <div class="sub">sum Total</div>
    </div>
    <div class="kpi green">
      <div class="kpi-icon">✅</div>
      <label>ยอดที่ขายได้ (WON)</label>
      <div class="val" id="kpi-won">—</div>
      <div class="sub">sum amount WON</div>
    </div>
  </div>

  <!-- Chart 1 -->
  <div class="section" id="sec-chart1">
    <div class="sec-hdr">
      <h2>Monthly Inquiry Overview</h2>
    </div>
    <div class="chart-scroll" id="c1-scroll">
      <canvas id="c1"></canvas>
    </div>
  </div>

  <!-- Chart 4: Monthly Amount Trend by Sales ID -->
  <div class="section" id="sec-chart4">
    <div class="sec-hdr">
      <h2>Monthly Inquiry Trend</h2>
      <div class="filter-group">
        <label>Sub Dept.</label>
        <div class="ms-wrap" id="ms-dept4"></div>
      </div>
    </div>
    <div class="chart-box" style="height:320px;position:relative">
      <canvas id="c4"></canvas>
    </div>
  </div>

  <!-- KPI: ยอดที่ขอราคา + ยอดเปิด PO (ใต้กราฟ 1) -->
  <div class="kpi-row" style="grid-template-columns:repeat(2,1fr);margin-top:0">
    <div class="kpi amber">
      <div class="kpi-icon">💰</div>
      <label>ยอดที่ขอราคา</label>
      <div class="val" id="kpi-amt">—</div>
      <div class="sub">sum Amount ฿ (ทุก Dept. by Supplier)</div>
    </div>
    <div class="kpi red">
      <div class="kpi-icon">📋</div>
      <label>ยอดเปิด PO</label>
      <div class="val" id="kpi-po">—</div>
      <div class="sub">sum Cost PO ×38 (ทุก Dept. by Supplier)</div>
    </div>
  </div>

  <!-- Chart 2 + Chart 3 -->
  <div id="sec-supplier" style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
    <div class="section">
      <div class="sec-hdr">
        <h2>Supplier: Amount vs Cost PO</h2>
        <div class="filter-group">
          <label>Supplier</label>
          <div class="ms-wrap" id="ms-sup2"></div>
        </div>
      </div>
      <div class="chart-box"><canvas id="c2"></canvas></div>
    </div>
    <div class="section">
      <div class="sec-hdr">
        <h2>% WON by Supplier</h2>
        <div class="filter-group">
          <label>Supplier</label>
          <div class="ms-wrap" id="ms-sup3"></div>
        </div>
      </div>
      <div class="chart-box"><canvas id="c3"></canvas></div>
    </div>
  </div>


</div>

/* ══ MULTISELECT ══ */
function createMS(id,allLbl,opts,onChange){
  const wrap=document.getElementById(id);
  if(!wrap){console.warn('ms wrap not found:',id);return null;}
  wrap.innerHTML='';

  const sel=new Set(opts);

  const btn=document.createElement('button');btn.className='ms-btn';btn.type='button';
  const drop=document.createElement('div');drop.className='ms-drop';
  const sd=document.createElement('div');sd.className='ms-search';
  const si=document.createElement('input');si.placeholder='ค้นหา...';si.type='text';
  sd.appendChild(si);drop.appendChild(sd);

  let allCb;
  const itemCbs=[];

  function isAllSelected(){return opts.length>0&&opts.every(o=>sel.has(o));}
  function syncAllCb(){if(allCb)allCb.checked=isAllSelected();}
  function updateBtn(){
    if(isAllSelected()){btn.textContent=allLbl;return;}
    const v=[...sel];
    btn.textContent=v.length===0?'(ไม่มีรายการ)':v.length===1?v[0]:v.length+' รายการ';
  }

  const allDiv=document.createElement('div');allDiv.className='ms-item';
  allCb=document.createElement('input');allCb.type='checkbox';allCb.checked=true;
  const allSp=document.createElement('span');allSp.textContent=allLbl;
  allDiv.appendChild(allCb);allDiv.appendChild(allSp);
  function toggleAll(){
    if(isAllSelected()){
      sel.clear();itemCbs.forEach(c=>{c.checked=false;});allCb.checked=false;
    } else {
      opts.forEach(o=>sel.add(o));itemCbs.forEach(c=>{c.checked=true;});allCb.checked=true;
    }
    updateBtn();onChange();
  }
  allCb.addEventListener('change',e=>{e.stopPropagation();toggleAll();});
  allSp.addEventListener('click',e=>{e.preventDefault();toggleAll();});

  opts.forEach(opt=>{
    const div=document.createElement('div');div.className='ms-item';
    const cb=document.createElement('input');cb.type='checkbox';cb.value=opt;cb.checked=true;
    const sp=document.createElement('span');sp.textContent=opt;
    div.appendChild(cb);div.appendChild(sp);
    itemCbs.push(cb);
    function toggleItem(){
      if(sel.has(opt)){
        sel.delete(opt);cb.checked=false;
        if(sel.size===0){opts.forEach(o=>sel.add(o));itemCbs.forEach(c=>{c.checked=true;});allCb.checked=true;}
      } else {sel.add(opt);cb.checked=true;}
      syncAllCb();updateBtn();onChange();
    }
    cb.addEventListener('change',e=>{e.stopPropagation();toggleItem();});
    sp.addEventListener('click',e=>{e.preventDefault();toggleItem();});
    drop.appendChild(div);
  });

  const acts=document.createElement('div');acts.className='ms-actions';
  const ba=document.createElement('button');ba.textContent='เลือกทั้งหมด';ba.type='button';
  ba.addEventListener('click',e=>{e.stopPropagation();opts.forEach(o=>sel.add(o));itemCbs.forEach(c=>{c.checked=true;});allCb.checked=true;updateBtn();onChange();});
  const bc=document.createElement('button');bc.textContent='ล้าง';bc.type='button';
  bc.addEventListener('click',e=>{e.stopPropagation();sel.clear();itemCbs.forEach(c=>{c.checked=false;});allCb.checked=false;updateBtn();onChange();});
  acts.appendChild(ba);acts.appendChild(bc);drop.appendChild(acts);

  si.addEventListener('input',()=>{
    const q=si.value.toLowerCase();
    drop.querySelectorAll('.ms-item').forEach(it=>{
      const v=it.querySelector('input').value||'';
      it.style.display=(it===allDiv||it.textContent.toLowerCase().includes(q))?'':'none';
    });
  });

  btn.addEventListener('click',e=>{e.stopPropagation();drop.classList.toggle('open');});
  document.addEventListener('click',()=>drop.classList.remove('open'));
  drop.addEventListener('click',e=>e.stopPropagation());

  drop.appendChild(allDiv);
  drop.appendChild(acts);
  updateBtn();
  wrap.appendChild(btn);wrap.appendChild(drop);
  return{
    getV:()=>isAllSelected()?['__ALL__']:[...sel],
    reset:()=>{opts.forEach(o=>sel.add(o));itemCbs.forEach(c=>{c.checked=true;});allCb.checked=true;updateBtn();},
    setV:(vals)=>{
      sel.clear();
      vals.forEach(v=>{if(opts.includes(v))sel.add(v);});
      itemCbs.forEach(c=>{c.checked=sel.has(c.value);});
      allCb.checked=isAllSelected();
      updateBtn();
    }
  };
}

const MONTH_ORDER=['JANUARY','FEBRUARY','MARCH','APRIL','MAY','JUNE','JULY','AUGUST','SEPTEMBER','OCTOBER','NOVEMBER','DECEMBER'];

/* ══ HELPERS ══ */
function fmt(n){if(!n||isNaN(n))return'—';if(n>=1e6)return(n/1e6).toFixed(2).replace(/\.?0+$/,'')+'M ฿';return Math.round(n).toLocaleString('th-TH')+' ฿';}
function fmtFull(n){return n>=1?Math.round(n).toLocaleString('th-TH'):'';}
function tickY(v){return v>=1e6?(v/1e6).toFixed(1)+'M':v>=1e3?(v/1e3).toFixed(0)+'K':v;}
function tipFmt(c){return' '+c.dataset.label+': '+Math.round(c.parsed.y).toLocaleString('th-TH')+' ฿';}
function filtByBrand(d,ms){const v=ms.getV();return v.includes('__ALL__')?d:d.filter(r=>v.includes(r['Brands']));}
function filtBySupplier(d,ms){const v=ms.getV();return v.includes('__ALL__')?d:d.filter(r=>v.includes(r['Supplier']));}

/* ══ APPLY FILTERS ══ */
function applyFilters(){
  const mv=msMonth.getV(), dv=msDept.getV();
  filtAll=RAW.filter(r=>mv.includes('__ALL__')||mv.includes(r['Months']));
  filtC1=RAW.filter(r=>{
    if(!mv.includes('__ALL__')&&!mv.includes(r['Months']))return false;
    if(!dv.includes('__ALL__')&&!dv.includes(r['Sub Dept.']))return false;
    return true;
  });
  updateKPI();renderC1();renderC2();renderC3();renderC4();
}
function applyC1Filter(){
  const mv=msMonth.getV(), dv=msDept.getV();
  filtC1=RAW.filter(r=>{
    if(!mv.includes('__ALL__')&&!mv.includes(r['Months']))return false;
    if(!dv.includes('__ALL__')&&!dv.includes(r['Sub Dept.']))return false;
    return true;
  });
  updateKPI();renderC1();
}
function resetAll(){
  if(msMonth)msMonth.reset();if(msDept)msDept.reset();if(msB1)msB1.reset();
  if(msSup2)msSup2.reset();if(msSup3)msSup3.reset();
  applyFilters();
}

/* ══ KPI ══ */
function updateKPI(){
  const s1=filtC1.filter(r=>GID_DEPTS.includes(r['Sub Dept.']));
  const sv2=msSup2?msSup2.getV():['__ALL__'];
  const s2=filtAll.filter(r=>{
    if(!r['Supplier']||r['Supplier'].toString().trim()==='')return false;
    if(!sv2.includes('__ALL__')&&!sv2.includes(r['Supplier']))return false;
    return true;
  });
  const won=s1.filter(r=>r['Status']==='WON').reduce((a,r)=>a+(r['amount WON']||0),0);
  const tot=s1.reduce((a,r)=>a+(r['Total']||0),0);
  const amt=s2.reduce((a,r)=>a+(r['Amount (฿)']||0),0);
  const po=s2.reduce((a,r)=>a+(r['Amount cost po (฿) x38']||0),0);
  document.getElementById('kpi-total').textContent=fmt(tot);
  document.getElementById('kpi-won').textContent=fmt(won);
  document.getElementById('kpi-amt').textContent=fmt(amt);
  document.getElementById('kpi-po').textContent=fmt(po);
}

/* ══ CHART 1 ══ */
function renderC1(){
  const raw=filtByBrand(filtC1.filter(r=>GID_DEPTS.includes(r['Sub Dept.'])),msB1);
  const tree={};
  GID_DEPTS.forEach(d=>{tree[d]={};});
  raw.forEach(r=>{
    const d=r['Sub Dept.'],s=r['Sales ID']||'?',b=r['Brands']||'N/A';
    if(!tree[d])return;
    if(!tree[d][s])tree[d][s]={};
    if(!tree[d][s][b])tree[d][s][b]={tot:0,won:0};
    tree[d][s][b].tot+=(r['Total']||0);
    if(r['Status']==='WON')tree[d][s][b].won+=(r['amount WON']||0);
  });
  const labels=[],totV=[],wonV=[];
  const deptGroups=[],sidGroups=[];
  GID_DEPTS.forEach(dept=>{
    const sids=Object.keys(tree[dept]).sort();
    if(!sids.length)return;
    const dStart=labels.length;
    sids.forEach(sid=>{
      const brds=Object.keys(tree[dept][sid]).sort((a,b)=>tree[dept][sid][b].tot-tree[dept][sid][a].tot);
      if(!brds.length)return;
      const sStart=labels.length;
      brds.forEach(br=>{
        labels.push(br);totV.push(tree[dept][sid][br].tot);wonV.push(tree[dept][sid][br].won);
      });
      sidGroups.push({name:sid,start:sStart,end:labels.length-1});
    });
    if(labels.length>dStart)deptGroups.push({name:dept,start:dStart,end:labels.length-1});
  });
  const n=labels.length;
  if(!n){if(C1)C1.destroy();return;}
  const W=Math.max(n*90+120,960), H=580;
  const scroll=document.getElementById('c1-scroll');
  scroll.style.height=(H+10)+'px';
  scroll.style.overflowX='auto';scroll.style.overflowY='hidden';
  scroll.innerHTML='';
  const cv=document.createElement('canvas');
  cv.id='c1';cv.setAttribute('width',W);cv.setAttribute('height',H);
  cv.style.cssText='display:block;width:'+W+'px;height:'+H+'px;';
  scroll.appendChild(cv);
  const Y_SID=H-52, Y_DEPT=H-28;
  const c1Plugin={id:'c1bg',afterDraw(chart){
    const ctx=chart.ctx;
    const yTop=chart.chartArea.top, yBot=chart.chartArea.bottom;
    const meta0=chart.getDatasetMeta(0);
    deptGroups.forEach((dg,i)=>{
      const barS=meta0.data[dg.start], barE=meta0.data[dg.end];
      if(!barS||!barE)return;
      const prevBar=i>0?meta0.data[deptGroups[i-1].end]:null;
      const nextBar=i<deptGroups.length-1?meta0.data[deptGroups[i+1].start]:null;
      const x0=prevBar?((prevBar.x+barS.x)/2):chart.chartArea.left;
      const x1=nextBar?((barE.x+nextBar.x)/2):chart.chartArea.right;
      ctx.save();ctx.globalAlpha=0.05;
      ctx.fillStyle=i%2===0?'#2563eb':'#10b981';
      ctx.fillRect(x0,yTop,x1-x0,H-yTop);ctx.restore();
      if(i>0){
        ctx.save();ctx.beginPath();ctx.moveTo(x0,yTop-6);ctx.lineTo(x0,H-10);
        ctx.strokeStyle='#dc2626';ctx.lineWidth=2;ctx.stroke();ctx.restore();
      }
      const mid=(x0+x1)/2;
      ctx.save();ctx.font='bold 11px Segoe UI';ctx.fillStyle='#1a3a5c';
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(dg.name,mid,Y_DEPT);ctx.restore();
    });
    sidGroups.forEach((sg,i)=>{
      const barS=meta0.data[sg.start], barE=meta0.data[sg.end];
      if(!barS||!barE)return;
      const bw=barS.width||30;
      if(i>0){
        const prevEnd=meta0.data[sg.start-1];
        if(prevEnd){
          const xDiv=(prevEnd.x+bw*1.1+barS.x-bw*1.1)/2;
          ctx.save();ctx.beginPath();ctx.moveTo(xDiv,yBot+2);ctx.lineTo(xDiv,yTop);
          ctx.strokeStyle='#94a3b8';ctx.lineWidth=1;ctx.setLineDash([3,3]);ctx.stroke();ctx.restore();
        }
      }
      const x0=barS.x-bw*1.1, x1=barE.x+bw*1.1;
      const mid=(x0+x1)/2;
      ctx.save();ctx.font='bold 10px Segoe UI';ctx.fillStyle='#374151';
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(sg.name,mid,Y_SID);ctx.restore();
    });
    [0,1].forEach(di=>{
      const meta=chart.getDatasetMeta(di);
      const ds=chart.data.datasets[di];
      meta.data.forEach((bar,idx)=>{
        const val=ds.data[idx];if(!val||val<1)return;
        const lbl=fmtFull(val);
        ctx.save();ctx.font='bold 9px Segoe UI';ctx.textAlign='center';ctx.textBaseline='bottom';
        const tw=ctx.measureText(lbl).width+6;
        ctx.fillStyle='rgba(255,255,255,0.88)';ctx.beginPath();
        if(ctx.roundRect)ctx.roundRect(bar.x-tw/2,bar.y-13,tw,12,3);else ctx.rect(bar.x-tw/2,bar.y-13,tw,12);
        ctx.fill();ctx.fillStyle=di===0?'#1e3a8a':'#9a3412';
        ctx.fillText(lbl,bar.x,bar.y-2);ctx.restore();
      });
    });
  }};
  if(C1)C1.destroy();
  C1=new Chart(cv,{type:'bar',
    data:{labels,datasets:[
      {label:'ยอดเสนอ (Total)',data:totV,backgroundColor:'rgba(37,99,235,.7)',borderColor:'#2563eb',borderWidth:1,barPercentage:.38,categoryPercentage:.9},
      {label:'ยอดขายได้ (WON)',data:wonV,backgroundColor:'rgba(16,185,129,.7)',borderColor:'#10b981',borderWidth:1,barPercentage:.38,categoryPercentage:.9}
    ]},
    options:{responsive:false,animation:false,
      layout:{padding:{top:40,right:20,bottom:150,left:60}},
      plugins:{legend:{position:'top',labels:{font:{size:12},padding:16}},tooltip:{callbacks:{label:tipFmt}}},
      scales:{
        x:{ticks:{font:{size:9},maxRotation:50,minRotation:45,callback:(v,i)=>(labels[i]||'').substring(0,12)},grid:{display:false}},
        y:{ticks:{callback:tickY,font:{size:11}},grid:{display:false}}}},
    plugins:[c1Plugin]});
}

/* ══ CHART 2 ══ */
function renderC2(){
  const data=filtBySupplier(filtAll.filter(r=>r['Supplier']&&r['Supplier'].toString().trim()!=''),msSup2);
  const g={};
  data.forEach(r=>{
    const k=r['Supplier']||'N/A';
    if(!g[k])g[k]={a:0,p:0};
    g[k].a+=(r['Amount (฿)']||0);g[k].p+=(r['Amount cost po (฿) x38']||0);
  });
  const lbs=Object.keys(g).sort((a,b)=>g[b].a-g[a].a);
  const c2Plugin={id:'c2lbl',afterDatasetsDraw(chart){
    const ctx=chart.ctx;
    chart.data.datasets.forEach((ds,di)=>{
      chart.getDatasetMeta(di).data.forEach((bar,idx)=>{
        const val=ds.data[idx];if(!val||val<1)return;
        const lbl=val>=1e6?(val/1e6).toFixed(1)+'M':val>=1e3?(val/1e3).toFixed(0)+'K':Math.round(val).toLocaleString('th-TH');
        const x=bar.x,y=bar.y-2;
        ctx.save();ctx.font='bold 9px Segoe UI';ctx.textAlign='center';ctx.textBaseline='bottom';
        const tw=ctx.measureText(lbl).width+6;
        ctx.fillStyle='rgba(255,255,255,0.88)';ctx.beginPath();
        if(ctx.roundRect)ctx.roundRect(x-tw/2,y-11,tw,12,3);else ctx.rect(x-tw/2,y-11,tw,12);
        ctx.fill();ctx.fillStyle=di===0?'#0369a1':'#92400e';ctx.fillText(lbl,x,y);ctx.restore();
      });
    });
  }};
  if(C2)C2.destroy();
  C2=new Chart(document.getElementById('c2'),{type:'bar',
    data:{labels:lbs,datasets:[
      {label:'Amount (฿)',data:lbs.map(k=>g[k].a),backgroundColor:'rgba(14,165,233,.75)',borderColor:'#0ea5e9',borderWidth:1},
      {label:'Cost PO (฿)×38',data:lbs.map(k=>g[k].p),backgroundColor:'rgba(245,158,11,.75)',borderColor:'#f59e0b',borderWidth:1}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      layout:{padding:{top:20}},
      plugins:{legend:{position:'top',labels:{font:{size:11}}},tooltip:{callbacks:{label:tipFmt}}},
      scales:{x:{ticks:{font:{size:10},maxRotation:45}},y:{ticks:{callback:tickY}}}},
    plugins:[c2Plugin]});
}

/* ══ CHART 3 ══ */
function renderC3(){
  const data=filtBySupplier(filtAll.filter(r=>r['Supplier']&&r['Supplier'].toString().trim()!=''),msSup3);
  const g={};
  data.forEach(r=>{
    const b=r['Supplier']||'N/A';
    if(!g[b])g[b]=0;
    if(r['Status']==='WON'&&r['amount WON'])g[b]+=r['amount WON'];
  });
  const lbs=Object.keys(g).filter(k=>g[k]>0).sort((a,b)=>g[b]-g[a]);
  const cols=lbs.map((_,i)=>PALETTE[i%PALETTE.length]);
  const c3Plugin={id:'c3pct',afterDatasetsDraw(chart){
    const ctx=chart.ctx;
    const total=chart.data.datasets[0].data.reduce((a,b)=>a+b,0);
    if(!total)return;
    chart.getDatasetMeta(0).data.forEach((arc,i)=>{
      const val=chart.data.datasets[0].data[i];
      const pct=(val/total*100).toFixed(1);
      if(parseFloat(pct)<3)return;
      const angle=(arc.startAngle+arc.endAngle)/2;
      const r=(arc.innerRadius+arc.outerRadius)/2;
      const x=arc.x+Math.cos(angle)*r;
      const y=arc.y+Math.sin(angle)*r;
      ctx.save();ctx.font='bold 11px Segoe UI';ctx.textAlign='center';ctx.textBaseline='middle';
      const lbl=pct+'%';const tw=ctx.measureText(lbl).width+8;
      ctx.fillStyle='rgba(255,255,255,0.82)';ctx.beginPath();
      if(ctx.roundRect)ctx.roundRect(x-tw/2,y-9,tw,18,4);else ctx.rect(x-tw/2,y-9,tw,18);
      ctx.fill();ctx.fillStyle='#1e293b';ctx.fillText(lbl,x,y);ctx.restore();
    });
  }};
  if(C3)C3.destroy();
  C3=new Chart(document.getElementById('c3'),{type:'doughnut',
    data:{labels:lbs,datasets:[{data:lbs.map(k=>g[k]),backgroundColor:cols,borderWidth:2,borderColor:'#fff'}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'right',labels:{font:{size:11},boxWidth:12,padding:8}},
        tooltip:{callbacks:{label:c=>{const t=c.dataset.data.reduce((a,b)=>a+b,0);
          const p=t>0?(c.parsed/t*100).toFixed(1):0;
          return' '+c.label+': '+Math.round(c.parsed).toLocaleString('th-TH')+' ฿ ('+p+'%)';}}}}},
    plugins:[c3Plugin]});
}

/* ══ CHART 4: Monthly Trend (Total) ══ */
function renderC4(){
  const dv=msDept4?msDept4.getV():['__ALL__'];
  // Filter data: selected Sub Depts, has Amount(฿)
  const data=filtAll.filter(r=>{
    if(!r['Amount (฿)']||r['Amount (฿)']<=0)return false;
    if(!dv.includes('__ALL__')&&!dv.includes(r['Sub Dept.']))return false;
    return true;
  });
  // X-axis: months present in filtered data, sorted
  const monthsInData=MONTH_ORDER.filter(m=>data.some(r=>r['Months']===m));
  // Single total line
  const totalData=monthsInData.map(m=>
    data.filter(r=>r['Months']===m).reduce((a,r)=>a+(r['Amount (฿)']||0),0)||null
  );
  if(C4)C4.destroy();
  C4=new Chart(document.getElementById('c4'),{
    type:'line',
    data:{
      labels:monthsInData.map(m=>m.substring(0,3)),
      datasets:[{
        label:'ยอดที่ขอราคา (฿)',
        data:totalData,
        borderColor:'#8b5cf6',
        backgroundColor:'rgba(139,92,246,0.08)',
        borderWidth:3,
        pointBackgroundColor:'#8b5cf6',
        pointBorderColor:'#fff',
        pointBorderWidth:2,
        pointRadius:6,
        pointHoverRadius:8,
        tension:0.3,
        fill:true,
        spanGaps:false
      }]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{display:false},
        tooltip:{callbacks:{
          label:c=>' ยอดที่ขอราคา: '+Math.round(c.parsed.y).toLocaleString('th-TH')+' ฿'
        }}
      },
      scales:{
        x:{grid:{display:false},ticks:{font:{size:13},color:'#475569'}},
        y:{ticks:{callback:tickY,font:{size:11}},grid:{display:false}}
      }
    }
  });
}
